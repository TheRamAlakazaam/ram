media:
  - name: images
    label: Images
    input: src/assets/images
    output: /src/assets/images
    extensions: [avif, jpg, jpeg, png, webp]
    categories: [image]
    rename: safe

content:
  - name: site
    label: Site Settings
    type: file
    path: src/data/profile.json
    format: json
    fields:
      - name: name
        label: Name
        type: string
      - name: defaultTitle
        label: Default SEO title
        type: string
      - name: description
        label: Site description
        type: text
      - name: location
        label: Location
        type: string
      - name: roles
        label: Roles
        type: string
        list: true
      - name: tools
        label: Tools
        type: string
        list: true
      - name: keywords
        label: SEO keywords
        type: string
        list: true
      - name: social
        label: Social links
        type: object
        fields:
          - name: instagram
            label: Instagram URL
            type: string
          - name: linkedin
            label: LinkedIn URL
            type: string
      - name: projects
        label: Project links
        type: object
        list: true
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
          - name: href
            label: URL
            type: string
          - name: status
            label: Status
            type: string
            required: false
      - name: artCv
        label: Selected CV
        type: object
        list: true
        fields:
          - name: year
            label: Year
            type: string
          - name: title
            label: Title
            type: string
          - name: venue
            label: Venue
            type: string
          - name: location
            label: Location
            type: string
          - name: notes
            label: Notes
            type: text
            required: false

  - name: writing
    label: Writing
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{title}.md"
    view:
      fields: [title, publishDate, tags]
      primary: title
      sort: [publishDate, title]
      default:
        sort: publishDate
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: publishDate
        label: Publish date
        type: date
        options:
          format: yyyy-MM-dd
      - name: updatedDate
        label: Updated date
        type: date
        default: ""
        options:
          format: yyyy-MM-dd
      - name: tags
        label: Tags
        type: string
        list: true
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: images
          path: writing
          rename: safe

  - name: photos
    label: Photos
    type: collection
    path: src/content/photos
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{title}.md"
    view:
      fields: [title, publishDate, location]
      primary: title
      sort: [publishDate, title]
      default:
        sort: publishDate
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: publishDate
        label: Publish date
        type: date
        options:
          format: yyyy-MM-dd
      - name: location
        label: Location
        type: string
      - name: alt
        label: Alt text
        type: text
      - name: image
        label: Image
        type: image
        options:
          media: images
          path: photos
          rename: safe
          extensions: [avif, jpg, jpeg, png, webp]
      - name: camera
        label: Camera
        type: string
      - name: lens
        label: Lens
        type: string
      - name: tone
        label: Placeholder tone
        type: select
        default: midnight
        options:
          values:
            - midnight
            - sunrise
            - moss
            - rust
      - name: tags
        label: Tags
        type: string
        list: true
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: images
          path: photos
          rename: safe
