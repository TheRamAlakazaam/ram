            type: string
          - name: errorMessage
            label: Error message
            type: string

  - name: writing
    label: Blog
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{title}.md"
    view:
      fields: [title, publishDate, tags]
      primary: title
      sort: [publishDate, title]
      default:
        sort: publishDate
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: SEO description
        type: text
      - name: publishDate
        label: Publish date
        type: date
        options:
          format: yyyy-MM-dd
      - name: updatedDate
        label: Updated date
        type: date
        default: ""
        required: false
        options:
          format: yyyy-MM-dd
      - name: tags
        label: Tags
        type: string
        list: true
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: images
          path: writing
          rename: safe

  - name: photos
    label: Photography Albums
    type: collection
    path: src/content/photos
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{title}.md"
    view:
      fields: [title, publishDate, location]
      primary: title
      sort: [publishDate, title]
      default:
        sort: publishDate
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: SEO description
        type: text
      - name: publishDate
        label: Publish date
        type: date
        options:
          format: yyyy-MM-dd
      - name: location
        label: Location
        type: string
      - name: coverAlt
        label: Cover alt text
        type: text
        required: false
      - name: coverImage
        label: Cover image
        type: image
        required: false
        options:
          media: images
          path: photos
          rename: safe
          extensions: [avif, jpg, jpeg, png, webp]
      - name: gallery
        label: Album gallery
        type: image
        required: false
        options:
          media: images
          multiple: true
          path: photos
          rename: safe
          extensions: [avif, jpg, jpeg, png, webp]
      - name: tags
        label: Tags
        type: string
        list: true
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: images
          path: photos
          rename: safe
