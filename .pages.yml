media:
  - name: images
    label: Images
    input: src/assets/images
    output: /src/assets/images
    extensions: [avif, jpg, jpeg, png, webp]
    categories: [image]
    rename: safe

content:
  - name: site
    label: Site Settings
    type: file
    path: src/data/profile.json
    format: json
    fields:
      - name: name
        label: Name
        type: string
      - name: defaultTitle
        label: Default SEO title
        type: string
      - name: description
        label: Site description
        type: text
      - name: defaultSocialImage
        label: Default social image
        type: image
        required: false
        options:
          media: images
          path: seo
          rename: safe
          extensions: [avif, jpg, jpeg, png, webp]
      - name: summary
        label: About summary
        type: text
      - name: location
        label: Location
        type: string
      - name: roles
        label: Roles
        type: string
        list: true
      - name: tools
        label: Tools
        type: string
        list: true
      - name: keywords
        label: SEO keywords
        type: string
        list: true
      - name: social
        label: Social links
        type: object
        fields:
          - name: instagram
            label: Instagram URL
            type: string
          - name: linkedin
            label: LinkedIn URL
            type: string
          - name: github
            label: GitHub URL
            type: string
      - name: projects
        label: Project links
        type: object
        list: true
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
          - name: href
            label: URL
            type: string
          - name: status
            label: Status
            type: string
            required: false
      - name: artCv
        label: Selected CV
        type: object
        list: true
        fields:
          - name: year
            label: Year
            type: string
          - name: title
            label: Title
            type: string
          - name: titleStyle
            label: Title style (use "italic" if needed)
            type: string
            required: false
          - name: venue
            label: Venue
            type: string
          - name: location
            label: Location
            type: string
          - name: notes
            label: Notes
            type: text
            required: false

