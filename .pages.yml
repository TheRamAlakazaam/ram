      - name: photography
        label: Photography Page
        type: object
        fields:
          - name: seoTitle
            label: SEO title
            type: string
          - name: seoDescription
            label: SEO description
            type: text
          - name: indexEyebrow
            label: Index eyebrow
            type: string
          - name: indexTitle
            label: Index title
            type: string
          - name: articleEyebrow
            label: Article eyebrow
            type: string
          - name: emptyState
            label: Empty state
            type: text
          - name: filters
            label: Filters
            type: object
            fields:
              - name: searchPlaceholder
                label: Search placeholder
                type: string
              - name: searchAriaLabel
                label: Search aria label
                type: string
              - name: sortNewestAriaLabel
                label: Sort newest aria label
                type: string
              - name: sortOldestAriaLabel
                label: Sort oldest aria label
                type: string
              - name: noResultsMessage
                label: No results message
                type: text
      - name: about
        label: About Page
        type: object
        fields:
          - name: seoTitle
            label: SEO title
            type: string
          - name: seoDescription
            label: SEO description
            type: text
          - name: heroEyebrow
            label: Hero eyebrow
            type: string
          - name: heroTitle
            label: Hero title
            type: string
          - name: summaryTitle
